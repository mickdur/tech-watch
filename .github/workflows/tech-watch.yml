name: Tech Watch Digest

on:
  schedule:
    # ~08:30 Paris time (CET = UTC+1 / CEST = UTC+2; this fires at 07:30 CET / 08:30 CEST)
    # Acceptable approximation — GitHub Actions cron runs in UTC.
    - cron: '30 6 * * *'
    # ~14:00 Paris time
    - cron: '0 12 * * *'
  # Allow manual trigger for testing
  workflow_dispatch:
    inputs:
      slot:
        description: 'Digest slot'
        required: true
        default: 'morning'
        type: choice
        options:
          - morning
          - afternoon

jobs:
  run-digest:
    name: Fetch, summarize, and deliver digest
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine slot from cron schedule
        id: slot
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "slot=${{ github.event.inputs.slot }}" >> "$GITHUB_OUTPUT"
          else
            # Derive slot from the current UTC hour
            HOUR=$(date -u +%H)
            if [ "$HOUR" -lt 10 ]; then
              echo "slot=morning" >> "$GITHUB_OUTPUT"
            else
              echo "slot=afternoon" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Run tech-watch pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py --slot ${{ steps.slot.outputs.slot }}

      - name: Commit updated seen-URLs state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/seen_urls.json
          git diff --cached --quiet || git commit -m "chore: update seen URLs state [skip ci]"
          git push
